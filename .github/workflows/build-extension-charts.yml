name: Build and Release Extension Charts

on:
  workflow_dispatch:
  release:
    types: [released]

defaults:
  run:
    shell: bash
    working-directory: ./

jobs:
  build-extension-charts:
    uses: rancher/dashboard/.github/workflows/build-extension-charts.yml@master
    permissions:
      actions: write
      contents: write
      deployments: write
      pages: write
    with:
      target_branch: gh-pages
      tagged_release: ${{ github.ref_name }}

  check-build-status:
    name: Check build status
    needs: build-extension-charts
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if build was not successful
        if: needs.build-extension-charts.outputs.build-job-status != 'success'
        run: |
          echo "::error::Build job failed with status: ${{ needs.build-extension-charts.outputs.build-job-status }}"
          exit 1

      - name: Build successful
        run: echo "Build completed successfully"
